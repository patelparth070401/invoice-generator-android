name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        flutter-version: '3.19.0' # Adjust if a different version is preferred

    - name: Install System Dependencies for Pillow
      run: sudo apt-get update && sudo apt-get install -y libjpeg-dev zlib1g-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install flet fpdf
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Build APK
      run: flet build apk --project InvoiceApp --description "Invoice Generator App" --android-min-sdk-version 21 --android-target-sdk-version 34

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: InvoiceApp-APK
        path: build/apk/**/*.apk
